<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Учеба по карточкам</title>
    <link rel="stylesheet" href="style.css">
</head>
<>

    <div class="box">
        <h3>Управление колодами</h3>
        <select id="deckSel"></select>
        <input type="text" id="newDeckInp" placeholder="Имя новой колоды">
        <button id="addDeckBtn">Создать колоду</button>
    </div>

    <div class="box">
        <h3>Добавить карточку</h3>
        <input type="text" id="qInp" placeholder="Вопрос (лицевая)">
        <input type="text" id="aInp" placeholder="Ответ (оборотная)">
        <button id="addBtn">Добавить</button>
    </div>

    <div class="box">
        <h3>Список всех карточек</h3>
        <table id="cardsTable">
            <thead>
                <tr>
                    <th>Вопрос</th>
                    <th>Ответ</th>
                    <th>Выучено</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody id="tBody">
                </tbody>
        </table>
    </div>

    <div class="box">
        <h3>Режим изучения</h3>
        <label><input type="checkbox" id="unlearnedCb"> Учить только невыученные</label>
        <button id="shufBtn" class="ml-10">Перемешать</button>

        <div class="study-area">
            <h2 id="cardText">Колода пуста</h2>
            <button id="flipBtn" class="mt-20">Перевернуть</button>
        </div>

        <div class="nav-area">
            <button id="prevBtn">Назад</button>
            <span id="prog" class="bold-text">0/0</span>
            <button id="nextBtn">Вперед</button>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="ui.js"></script>
    <script src="logic.js"></script>
</body>
</html>
